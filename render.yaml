services:
  - type: web
    name: zenroot
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: build/client
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
